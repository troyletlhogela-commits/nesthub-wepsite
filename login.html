<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NestHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #1A3C6E; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { background-color: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin: 20px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { margin: 0; font-size: 32px; color: #1A3C6E; }
        .logo h1 span { color: #F5A623; }
        .logo p { color: gray; font-size: 14px; margin: 4px 0 0 0; }
        .tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: gray; font-size: 15px; }
        .tab.active { color: #1A3C6E; border-bottom: 3px solid #1A3C6E; margin-bottom: -2px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #1A3C6E; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1.5px solid #d0d8e4; font-size: 15px; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1A3C6E; }
        .submit-btn { width: 100%; background-color: #F5A623; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .submit-btn:hover { background-color: #1A3C6E; }
        .message { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
        .message.success { background-color: #d4edda; color: #155724; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; display: block; }
        .forgot { text-align: center; margin-top: 16px; font-size: 13px; color: gray; }
        .forgot a { color: #1A3C6E; text-decoration: none; font-weight: bold; }
        #signup-form { display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>Nest<span>Hub</span></h1>
        <p>Find a place. Make it home.</p>
    </div>

    <div class="tabs">
        <div class="tab active" id="login-tab" onclick="showLogin()">Log In</div>
        <div class="tab" id="signup-tab" onclick="showSignup()">Sign Up</div>
    </div>

    <!-- Login Form -->
    <div id="login-form">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Your password"/>
        </div>
        <button class="submit-btn" onclick="loginUser()">Log In</button>
        <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot Password?</a></div>
        <div id="forgot-message" class="message"></div>
        <div id="login-message" class="message"></div>
    </div>

    <!-- Sign Up Form -->
    <div id="signup-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signup-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="signup-phone" placeholder="e.g. 71234567"/>
        </div>
        <div class="form-group">
            <label>I am a</label>
            <select id="signup-role">
                <option value="tenant">Tenant — Looking for a place</option>
                <option value="landlord">Landlord — I have a property</option>
            </select>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="Create a password"/>
        </div>
        <button class="submit-btn" onclick="signupUser()">Create Account</button>
        <div id="signup-message" class="message"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    firebase.initializeApp({
        apiKey: "AIzaSyCfQ5jFcceOGMZBlBaIu1GtR1J1hyGKrO8",
        authDomain: "nesthub-5e83c.firebaseapp.com",
        projectId: "nesthub-5e83c",
        storageBucket: "nesthub-5e83c.firebasestorage.app",
        messagingSenderId: "596386242109",
        appId: "1:596386242109:web:5a1e77e0db91f6a6119454"
    });

    var auth = firebase.auth();
    var db = firebase.firestore();

    function loginUser() {
        var email = document.getElementById("login-email").value;
        var password = document.getElementById("login-password").value;
        var msg = document.getElementById("login-message");

        auth.signInWithEmailAndPassword(email, password)
            .then(function() {
                msg.className = "message success";
                msg.textContent = "✅ Login successful! Redirecting...";
                setTimeout(function() { window.location.href = "index.html"; }, 1500);
            })
            .catch(function(error) {
                msg.className = "message error";
                msg.textContent = "❌ " + error.message;
            });
    }

    function signupUser() {
        var name = document.getElementById("signup-name").value;
        var email = document.getElementById("signup-email").value;
        var phone = document.getElementById("signup-phone").value;
        var role = document.getElementById("signup-role").value;
        var password = document.getElementById("signup-password").value;
        var msg = document.getElementById("signup-message");

        if(!name || !email || !phone || !password) {
            msg.className = "message error";
            msg.textContent = "❌ Please fill in all fields.";
            return;
        }

        // Check if phone number already exists
        db.collection("users").where("phone", "==", phone).get()
            .then(function(snap) {
                if(!snap.empty) {
                    msg.className = "message error";
                    msg.textContent = "❌ This phone number is already registered on NestHub. Please log in instead.";
                    return;
                }

                // Phone is free — proceed with signup
                auth.createUserWithEmailAndPassword(email, password)
                    .then(function(userCredential) {
                        var user = userCredential.user;
                        return db.collection("users").doc(user.uid).set({
                            name: name,
                            email: email,
                            phone: phone,
                            role: role,
                            createdAt: new Date()
                        });
                    })
                    .then(function() {
                        msg.className = "message success";
                        msg.textContent = "✅ Account created! Redirecting...";
                        setTimeout(function() { window.location.href = "index.html"; }, 1500);
                    })
                    .catch(function(error) {
                        msg.className = "message error";
                        msg.textContent = "❌ " + error.message;
                    });
            })
            .catch(function(error) {
                msg.className = "message error";
                msg.textContent = "❌ " + error.message;
            });
    }

    function forgotPassword() {
        var email = document.getElementById("login-email").value;
        var msg = document.getElementById("forgot-message");

        if(!email) {
            msg.className = "message error";
            msg.textContent = "❌ Please enter your email address first then click Forgot Password";
            return;
        }

        auth.sendPasswordResetEmail(email)
            .then(function() {
                msg.className = "message success";
                msg.textContent = "✅ Password reset email sent! Check your inbox.";
            })
            .catch(function(error) {
                msg.className = "message error";
                msg.textContent = "❌ " + error.message;
            });
    }

    function showLogin() {
        document.getElementById("login-form").style.display = "block";
        document.getElementById("signup-form").style.display = "none";
        document.getElementById("login-tab").className = "tab active";
        document.getElementById("signup-tab").className = "tab";
    }

    function showSignup() {
        document.getElementById("signup-form").style.display = "block";
        document.getElementById("login-form").style.display = "none";
        document.getElementById("signup-tab").className = "tab active";
        document.getElementById("login-tab").className = "tab";
    }
</script>

</body>
</html>
